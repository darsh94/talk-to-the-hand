<!DOCTYPE html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0}
  .canvas{width:1024px;height:1024px;position:relative;overflow:hidden;
    background:radial-gradient(circle at 50% 38%, #4f86ff 0%, #2f6df6 45%, #1f52c9 100%);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-54%);
    width:660px;height:660px;border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,.28) 0%, rgba(255,255,255,0) 68%)}
  .hand{position:absolute;top:50%;left:50%;transform:translate(-50%,-52%);
    font-size:520px;line-height:1;filter:drop-shadow(0 18px 40px rgba(10,25,70,.35))}
  .ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:900px;height:900px;border-radius:50%;border:6px solid rgba(255,255,255,.14)}
</style></head><body>
  <div class="canvas">
    <div class="ring"></div>
    <div class="glow"></div>
    <div class="hand">🤟</div>
  </div>
</body></html>
