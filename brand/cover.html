<!DOCTYPE html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0}
  .c{width:1640px;height:624px;position:relative;overflow:hidden;display:flex;align-items:center;
    background:linear-gradient(120deg,#1f52c9 0%,#2f6df6 55%,#4f86ff 100%);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .hand{position:absolute;right:90px;top:50%;transform:translateY(-50%);font-size:400px;
    opacity:.92;filter:drop-shadow(0 16px 34px rgba(10,25,70,.35))}
  .txt{position:relative;z-index:2;padding:0 90px;max-width:1050px}
  .eyebrow{color:#ffd9c7;font-size:26px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;margin-bottom:18px}
  h1{color:#fff;font-size:74px;line-height:1.08;margin:0;font-weight:800;letter-spacing:-.02em}
  h1 .a{color:#bcd3ff}
  p{color:#e7efff;font-size:30px;margin:22px 0 0;font-weight:500}
</style></head><body>
  <div class="c">
    <div class="hand">🤟</div>
    <div class="txt">
      <div class="eyebrow">For parents of deaf &amp; hard-of-hearing kids</div>
      <h1>Your child is learning to sign.<br><span class="a">Learn to sign back.</span></h1>
      <p>A gentle at-home coach — a few minutes a day.</p>
    </div>
  </div>
</body></html>
